name: Benchmarks

on:
  push:
    branches: [main]

permissions:
  checks: write

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: bencherdev/bencher@main

      - name: Run benchmarks
        run: |
          bencher run \
          --project zyn \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch main \
          --testbed ubuntu-latest \
          --adapter rust_bench \
          cargo bench -p zyn
