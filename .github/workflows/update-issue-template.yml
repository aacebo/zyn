name: Update Issue Template Versions

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from release tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Add version to bug report template
        run: |
          version="${{ steps.version.outputs.version }}"
          file=".github/ISSUE_TEMPLATE/bug_report.yml"

          # Check if version already exists
          if grep -q "\"$version\"" "$file"; then
            echo "Version $version already exists, skipping."
            exit 0
          fi

          # Insert new version at the top of the options list
          sed -i "/^      options:$/a\\        - \"$version\"" "$file"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/bug_report.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: add v${{ steps.version.outputs.version }} to bug report template"
          git push
